# Деплой на сервер по SSH (rsync) при пуше в main.
# Secrets: DEPLOY_USER, DEPLOY_HOST, DEPLOY_PATH, DEPLOY_SSH_KEY
# Рекомендуется также: VITE_API_URL (URL API для продакшен-сборки фронта, например https://api.example.com/api)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run deploy script
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          chmod +x scripts/deploy-hosting.sh
          ./scripts/deploy-hosting.sh
